spring.application.name=api-gateway
# Server
server.port=${PORT:8080}

# Auth Service
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# Book Service
spring.cloud.gateway.server.webmvc.routes[1].id=book-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://book-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/books/**

# Cart Service
spring.cloud.gateway.server.webmvc.routes[2].id=cart-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://cart-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/cart/**

# Order Service
spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/orders/**

# Wallet Service
spring.cloud.gateway.server.webmvc.routes[4].id=wallet-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://wallet-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/wallet/**

# Review Service
spring.cloud.gateway.server.webmvc.routes[5].id=review-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://review-service
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/reviews/**

# Notification Service
spring.cloud.gateway.server.webmvc.routes[6].id=notification-service
spring.cloud.gateway.server.webmvc.routes[6].uri=lb://notification-service
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/notifications/**

# Wishlist Service
spring.cloud.gateway.server.webmvc.routes[7].id=wishlist-service
spring.cloud.gateway.server.webmvc.routes[7].uri=lb://wishlist-service
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/wishlist/**

# OAuth2 Routes
spring.cloud.gateway.server.webmvc.routes[8].id=oauth2-authorization
spring.cloud.gateway.server.webmvc.routes[8].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[8].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.server.webmvc.routes[9].id=oauth2-callback
spring.cloud.gateway.server.webmvc.routes[9].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[9].predicates[0]=Path=/login/oauth2/**

# API Docs Routes (for Swagger UI via Gateway)
spring.cloud.gateway.server.webmvc.routes[10].id=auth-service-docs
spring.cloud.gateway.server.webmvc.routes[10].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[10].predicates[0]=Path=/auth-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[10].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[11].id=book-service-docs
spring.cloud.gateway.server.webmvc.routes[11].uri=lb://book-service
spring.cloud.gateway.server.webmvc.routes[11].predicates[0]=Path=/book-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[11].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[12].id=cart-service-docs
spring.cloud.gateway.server.webmvc.routes[12].uri=lb://cart-service
spring.cloud.gateway.server.webmvc.routes[12].predicates[0]=Path=/cart-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[12].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[13].id=order-service-docs
spring.cloud.gateway.server.webmvc.routes[13].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[13].predicates[0]=Path=/order-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[13].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[14].id=wallet-service-docs
spring.cloud.gateway.server.webmvc.routes[14].uri=lb://wallet-service
spring.cloud.gateway.server.webmvc.routes[14].predicates[0]=Path=/wallet-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[14].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[15].id=review-service-docs
spring.cloud.gateway.server.webmvc.routes[15].uri=lb://review-service
spring.cloud.gateway.server.webmvc.routes[15].predicates[0]=Path=/review-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[15].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[16].id=notification-service-docs
spring.cloud.gateway.server.webmvc.routes[16].uri=lb://notification-service
spring.cloud.gateway.server.webmvc.routes[16].predicates[0]=Path=/notification-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[16].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[17].id=wishlist-service-docs
spring.cloud.gateway.server.webmvc.routes[17].uri=lb://wishlist-service
spring.cloud.gateway.server.webmvc.routes[17].predicates[0]=Path=/wishlist-service/api-docs/**
spring.cloud.gateway.server.webmvc.routes[17].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowed-origins=${FRONTEND_URL}
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

# Actuator
management.endpoints.web.exposure.include=health,info,gateway

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/api-docs

springdoc.swagger-ui.urls[1].name=Book Service
springdoc.swagger-ui.urls[1].url=/book-service/api-docs

springdoc.swagger-ui.urls[2].name=Cart Service
springdoc.swagger-ui.urls[2].url=/cart-service/api-docs

springdoc.swagger-ui.urls[3].name=Order Service
springdoc.swagger-ui.urls[3].url=/order-service/api-docs

springdoc.swagger-ui.urls[4].name=Wallet Service
springdoc.swagger-ui.urls[4].url=/wallet-service/api-docs

springdoc.swagger-ui.urls[5].name=Review Service
springdoc.swagger-ui.urls[5].url=/review-service/api-docs

springdoc.swagger-ui.urls[6].name=Notification Service
springdoc.swagger-ui.urls[6].url=/notification-service/api-docs

springdoc.swagger-ui.urls[7].name=Wishlist Service
springdoc.swagger-ui.urls[7].url=/wishlist-service/api-docs

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=true
