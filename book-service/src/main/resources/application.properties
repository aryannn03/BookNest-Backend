# Server Configuration
server.port=8082
spring.application.name=book-service


# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/booknest_books?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=@ryanmysqlpass03
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true


# Auth Service URL
# (book-service calls auth-service to validate tokens)
auth.service.url=http://localhost:8081


# Logging
logging.level.com.booknest=DEBUG